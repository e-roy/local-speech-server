services:
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: speech-kokoro
    restart: unless-stopped
    expose:
      - "8880"
    volumes:
      - kokoro_models:/app/api/src/models
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - speech

  speaches:
    # Pinned: PRELOAD_MODELS and the model-registry workflow need the 0.9
    # line (0.8.x used a different config surface). Bump to 0.9.0 final when
    # released. The -cpu image is multi-arch (native linux/arm64).
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cpu
    container_name: speech-speaches
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - speaches_models:/home/ubuntu/.cache/huggingface/hub
    environment:
      # JSON array of model IDs downloaded at startup if missing. Models not
      # in this list 404 at request time — see docs/stt.md to change models.
      # The Kokoro ONNX entry is the TTS voice of /v1/realtime sessions.
      - 'PRELOAD_MODELS=["Systran/faster-distil-whisper-small.en","speaches-ai/Kokoro-82M-v1.0-ONNX"]'
      # Realtime sessions call an OpenAI-compatible chat backend: the same
      # host-side Ollama that Caddy publishes at /v1/llm/* (docs/llm.md).
      - CHAT_COMPLETION_BASE_URL=http://host.docker.internal:11434/v1
      # int8 quantization is the standard speed/quality trade-off on CPU.
      - WHISPER__COMPUTE_TYPE=int8
      - LOG_LEVEL=info
      # Gradio UI is unreachable behind Caddy; disabling saves memory.
      - ENABLE_UI=false
    networks:
      - speech

  caddy:
    image: caddy:2-alpine
    container_name: speech-caddy
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/static:/srv:ro
    environment:
      - API_KEYS=${API_KEYS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - kokoro
      - speaches
    networks:
      - speech

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: speech-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy
    networks:
      - speech

networks:
  speech:
    driver: bridge

volumes:
  kokoro_models:
  speaches_models:
